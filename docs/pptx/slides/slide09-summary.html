<!DOCTYPE html>

<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;

  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
}
.content {

}
.accent-bar {

}
.card-grid {
  display: flex; gap: 12pt; margin-top: 20pt; flex-wrap: wrap; justify-content: center;
}
.mini-card {
  background: rgba(255,255,255,0.08); border: 1pt solid rgba(255,255,255,0.12);
  border-radius: 10pt; padding: 12pt 16pt; width: 140pt; text-align: center;
}
</style>
</head>

<div class="content">

    <div class="mini-card">

      <p style="color: #a78bfa; font-size: 20pt; margin: 0;">📚</p>
      <p style="color: #fff; font-size: 11pt; margin: 6pt 0 0 0; font-weight: 600;">教育工具</p>
      <p style="color: rgba(255,255,255,0.5); font-size: 9pt; margin: 4pt 0 0 0;">答疑 · 批改 · 出卷</p>
