<!DOCTYPE html>
<html>
<head>
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  font-family: Arial, sans-serif;
  display: flex;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
}
.left {
  width: 55%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding-left: 60pt;
}
.right {
  width: 45%;
  display: flex;
  align-items: center;
  justify-content: center;
}
.accent-bar {
  width: 60pt;
  height: 4pt;
  background: #7c6aef;
  margin-bottom: 20pt;
  border-radius: 2pt;
}
.icon-circle {
  width: 140pt;
  height: 140pt;
  border-radius: 70pt;
  background: rgba(124,106,239,0.15);
  border: 3pt solid rgba(124,106,239,0.3);
  display: flex;
  align-items: center;
  justify-content: center;
}
</style>
</head>
<body>
<div class="left">
  <div class="accent-bar"></div>
  <h1 style="color: #ffffff; font-size: 36pt; margin: 0 0 12pt 0; font-weight: 700;">YuanBaoAI</h1>
  <p style="color: #a78bfa; font-size: 18pt; margin: 0 0 8pt 0; font-weight: 600;">仿腾讯元宝 AI 对话 APP</p>
  <p style="color: rgba(255,255,255,0.6); font-size: 13pt; margin: 30pt 0 0 0; line-height: 1.6;">React Native + NestJS + Python 三端架构</p>
  <p style="color: rgba(255,255,255,0.4); font-size: 11pt; margin: 8pt 0 0 0;">项目答辩</p>
</div>
<div class="right">
  <div class="icon-circle">
    <p style="font-size: 64pt; margin: 0;">🤖</p>
  </div>
</div>
</body>
</html>
